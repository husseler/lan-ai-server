<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LAN AI Chat</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080c14;
      --surface:  #0d1321;
      --surface2: #111827;
      --border:   #1e2d45;
      --accent:   #3b82f6;
      --accent2:  #06b6d4;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --user-bg:  #1d4ed8;
      --bot-bg:   #0f172a;
      --green:    #22c55e;
      --red:      #ef4444;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .login-box h1 {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .login-box p {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    .login-box input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-box input:focus { border-color: var(--accent); }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-btn:hover { opacity: 0.85; }

    #login-error {
      color: var(--red);
      font-size: 0.78rem;
      text-align: center;
      display: none;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      font-size: 1rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      outline: none;
      cursor: pointer;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    #model-loading {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .avatar.user-av { background: var(--user-bg); color: white; }
    .avatar.bot-av  { background: var(--border);  color: var(--accent2); }

    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 75%;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .msg.user {
      background: var(--user-bg);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.thinking {
      color: var(--muted);
      font-style: italic;
      font-size: 0.82rem;
    }

    .msg-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .msg-row.user .msg-meta { text-align: right; }

    /* markdown */
    .msg pre {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .msg code { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }
    .msg p { margin: 6px 0; }
    .msg ul, .msg ol { padding-left: 1.2rem; margin: 6px 0; }

    /* ── INPUT AREA ── */
    #input-area {
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      resize: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      line-height: 1.5;
      max-height: 120px;
      min-height: 44px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--accent); }

    #send {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #send:hover   { opacity: 0.85; }
    #send:active  { transform: scale(0.97); }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }

    #clear {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    #clear:hover { color: var(--text); }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
    }

    .empty-state span { font-size: 2rem; }
    .empty-state p { font-size: 0.85rem; }
  </style>
</head>

<body>

  <!-- ── LOGIN SCREEN ── -->
  <div id="login-screen">
    <div class="login-box">
      <h1>⚡ LAN AI Chat</h1>
      <p>Enter your API key to continue</p>
      <input type="password" id="key-input" placeholder="Paste your API key here..." />
      <button class="login-btn" onclick="doLogin()">Unlock</button>
      <div id="login-error">Invalid API key. Try again.</div>
    </div>
  </div>

  <!-- ── MAIN APP ── -->
  <header>
    <div class="logo">⚡ LAN AI Chat</div>
    <div class="header-controls">
      <span id="model-loading">Loading...</span>
      <select id="model"></select>
      <select id="mode">
        <option value="chat">Chat</option>
        <option value="generate">Generate</option>
      </select>
      <div id="status-dot" title="Connected"></div>
    </div>
  </header>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <span>🤖</span>
      <p>Ask me anything — powered by Ollama + Gemini</p>
    </div>
  </div>

  <div id="input-area">
    <button id="clear" onclick="clearChat()">Clear</button>
    <textarea id="prompt" placeholder="Ask something... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button id="send">Send</button>
  </div>

<script>
  // ── API KEY MANAGEMENT ──
  // Stored only in sessionStorage — clears when browser tab closes
  let APP_API_KEY = sessionStorage.getItem('ai_api_key') || '';

  function doLogin() {
    const key = document.getElementById('key-input').value.trim();
    if (!key) return;

    // Test the key with a real request
    fetch('/health')
      .then(() => {
        // Try models endpoint with the key
        return fetch('/models', {
          headers: { 'X-API-Key': key }
        });
      })
      .then(res => {
        if (res.status === 403) {
          document.getElementById('login-error').style.display = 'block';
        } else {
          APP_API_KEY = key;
          sessionStorage.setItem('ai_api_key', key);
          document.getElementById('login-screen').style.display = 'none';
          loadModels();
        }
      })
      .catch(() => {
        document.getElementById('login-error').style.display = 'block';
      });
  }

  // Allow Enter key on login
  document.getElementById('key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Auto-login if key already in session
  if (APP_API_KEY) {
    fetch('/models', { headers: { 'X-API-Key': APP_API_KEY } })
      .then(res => {
        if (res.ok) {
          document.getElementById('login-screen').style.display = 'none';
          loadModels();
        } else {
          sessionStorage.removeItem('ai_api_key');
          APP_API_KEY = '';
        }
      });
  }

  // ── APP LOGIC ──
  const sendBtn   = document.getElementById('send');
  const promptEl  = document.getElementById('prompt');
  const messages  = document.getElementById('messages');
  const modelEl   = document.getElementById('model');
  const modeEl    = document.getElementById('mode');
  const modelLoad = document.getElementById('model-loading');
  const emptyState = document.getElementById('empty-state');

  async function loadModels() {
    try {
      const res = await fetch('/models', {
        headers: { 'X-API-Key': APP_API_KEY }
      });
      const data = await res.json();

      modelEl.innerHTML = '';
      let firstGemini = null;

      (data.ollama || []).forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = '🖥️ ' + m;
        modelEl.appendChild(opt);
      });

      (data.gemini || []).forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = '🌐 ' + m;
        modelEl.appendChild(opt);
        if (!firstGemini) firstGemini = m;
      });

      if (firstGemini) modelEl.value = firstGemini;
      modelLoad.textContent = (modelEl.options.length) + ' models';

    } catch (err) {
      console.error('Failed to load models:', err);
      modelEl.innerHTML = '<option value="mistral">🖥️ mistral</option>';
      modelLoad.textContent = '⚠️ offline';
    }
  }

  function addMessage(text, type, meta = '') {
    if (emptyState) emptyState.style.display = 'none';

    const row = document.createElement('div');
    row.className = 'msg-row ' + (type === 'user' ? 'user' : '');

    const av = document.createElement('div');
    av.className = 'avatar ' + (type === 'user' ? 'user-av' : 'bot-av');
    av.textContent = type === 'user' ? 'You' : 'AI';

    const msg = document.createElement('div');
    msg.className = 'msg ' + type;

    const wrap = document.createElement('div');

    if (type === 'bot' && text !== '⏳ Thinking...') {
      msg.innerHTML = marked.parse(text);
      setTimeout(() => { if (typeof hljs !== 'undefined') hljs.highlightAll(); }, 0);
    } else {
      msg.textContent = text;
      if (text === '⏳ Thinking...') msg.classList.add('thinking');
    }

    if (meta) {
      const metaEl = document.createElement('div');
      metaEl.className = 'msg-meta';
      metaEl.textContent = meta;
      wrap.appendChild(msg);
      wrap.appendChild(metaEl);
    } else {
      wrap.appendChild(msg);
    }

    row.appendChild(av);
    row.appendChild(wrap);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;

    return msg;
  }

  function clearChat() {
    messages.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.id = 'empty-state';
    empty.innerHTML = '<span>🤖</span><p>Ask me anything — powered by Ollama + Gemini</p>';
    messages.appendChild(empty);
  }

  sendBtn.onclick = async () => {
    const prompt = promptEl.value.trim();
    if (!prompt) return;

    addMessage(prompt, 'user');
    promptEl.value = '';
    sendBtn.disabled = true;

    const thinkingMsg = addMessage('⏳ Thinking...', 'bot');

    const start = Date.now();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-API-Key': APP_API_KEY
        },
        body: JSON.stringify({
          prompt,
          model: modelEl.value,
          mode: modeEl.value,
          temperature: 0.2,
          max_tokens: 512
        })
      });

      const data = await res.json();
      const elapsed = ((Date.now() - start) / 1000).toFixed(1);

      // Replace thinking message
      thinkingMsg.classList.remove('thinking');
      thinkingMsg.innerHTML = marked.parse(data.answer || 'No response');
      setTimeout(() => { if (typeof hljs !== 'undefined') hljs.highlightAll(); }, 0);

      // Add meta below
      const metaEl = document.createElement('div');
      metaEl.className = 'msg-meta';
      metaEl.textContent = `${data.model} · ${elapsed}s`;
      thinkingMsg.parentNode.appendChild(metaEl);

    } catch (e) {
      thinkingMsg.textContent = 'Error: ' + e.message;
      thinkingMsg.style.color = 'var(--red)';
    }

    sendBtn.disabled = false;
    messages.scrollTop = messages.scrollHeight;
  };

  promptEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  // Auto-resize textarea
  promptEl.addEventListener('input', () => {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
